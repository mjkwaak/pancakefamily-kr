<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pancake Family</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:#fff;font-family:'adobe-myungjo-std',serif;min-height:100vh;overflow-x:hidden}

/* 시작 화면 */
#scr-start{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;z-index:100;padding:2rem}
#scr-start .title{font-family:'adobe-myungjo-std',serif;font-size:26px;letter-spacing:-0.05em;font-weight:400;color:#fff;display:flex;flex-direction:column;align-items:center;line-height:1.0;text-align:center;white-space:nowrap}
#scr-start .warn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c84b1e;letter-spacing:0.08em;text-align:center}
#scr-start .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#555;letter-spacing:0.08em;text-align:center;line-height:1.9}
.btn{background:transparent;border:1px solid #333;color:#888;padding:13px 40px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:border-color .3s,color .3s}
.btn:hover{border-color:#666;color:#ccc}
.lnk{font-size:11px;color:#2a2a2a;font-family:'IBM Plex Mono',monospace;cursor:pointer;text-decoration:underline;text-underline-offset:4px;transition:color .3s}
.lnk:hover{color:#555}

/* 보정 화면 */
#scr-cal{position:fixed;inset:0;background:#000;display:none;z-index:100}
#cal-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'IBM Plex Mono',monospace;font-size:11px;color:#888;letter-spacing:0.2em;text-align:center;line-height:2;pointer-events:none}
.cdot{position:absolute;width:22px;height:22px;border-radius:50%;background:#c84b1e;transform:translate(-50%,-50%);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 0 0 7px rgba(200,75,30,.18);transition:opacity .3s}
.cdot.off{opacity:.2;pointer-events:none}
.cdot.done{opacity:.1;pointer-events:none}

/* 웹캠 (처리용) */
#vid{position:fixed;bottom:12px;right:12px;width:120px;height:80px;border-radius:4px;object-fit:cover;opacity:.3;z-index:50;display:none;transform:scaleX(-1)}

/* 시선 점 — 항상 DOM에 있고 visibility로 제어 */
#dot{position:fixed;width:14px;height:14px;border-radius:50%;background:rgba(200,75,30,.8);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);visibility:hidden;left:-50px;top:-50px}

/* 진행 바 */
#bar{position:fixed;top:0;left:0;height:1px;background:#c84b1e;width:0;z-index:98}

/* 상태 바 */
#sbar{position:fixed;bottom:0;left:0;right:0;padding:10px 28px;display:none;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#2a2a2a;letter-spacing:0.12em;background:#000;border-top:1px solid rgba(255,255,255,.06);justify-content:space-between;align-items:center}

/* 리더 */
#reader{display:none;max-width:720px;margin:0 auto;padding:80px 40px 100px}
@media(max-width:600px){#reader{padding:60px 16px 90px}}
#doc-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.3em;color:#2a2a2a;margin-bottom:56px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:16px}
.para{margin-bottom:1.5em;line-height:1.9;font-size:14px;color:#fff;font-family:'adobe-myungjo-std',serif}
#txt{}.spk{font-family:'adobe-myungjo-std',serif;font-size:14px;color:#555;display:block;padding-top:0;text-align:right;padding-right:0}.para{margin-bottom:1.2em}
.ch{display:inline}



/* 완료 */
#scr-done{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
#scr-done p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#555;letter-spacing:0.2em;text-align:center;line-height:2}
#scr-done .big{font-size:13px;color:#444}
.spk-row{display:grid;grid-template-columns:72px 1fr;column-gap:24px;margin-top:2em}.spk{font-family:'adobe-myungjo-std',serif;font-size:14px;color:#555;line-height:inherit;padding-top:0;text-align:left;white-space:nowrap}.spk-row .para{margin-top:0;margin-bottom:0}.para.no-spk{margin-left:96px}</style>
<script>(function(d){var config={kitId:"ywo8vka",scriptTimeout:3000,async:true},h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src="https://use.typekit.net/"+config.kitId+".js";tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)})(document);</script>
</head>
<body>

<!-- 시작 -->
<div id="scr-start">
  <div class="title"><span>팬케이크</span><span>가족</span></div>
  <p class="warn">⚠ 웹캠 접근 권한이 필요합니다</p>
  
  <button class="btn" id="btn-start">웹캠으로 시작</button>
  <span class="lnk" id="btn-mouse">마우스 모드로 체험하기</span>
</div>

<!-- 보정 -->
<div id="scr-cal">
  <div id="cal-label">빨간 점을 순서대로 응시하며 클릭하세요</div>
</div>

<!-- 웹캠 -->
<video id="vid" autoplay playsinline muted></video>

<!-- 시선 점 (항상 DOM에 존재) -->
<div id="dot"></div>

<div id="bar"></div>
<div id="sbar"><span id="sbar-l">—</span><span id="sbar-r">0% 소멸됨</span></div>

<div id="reader">
  
  
  <div id="txt"></div>
</div>

<div id="scr-done">
  <p class="big">책이 모두 사라졌습니다.</p>
  <p>당신이 읽었기 때문에.<br>이 이야기는 이제 당신 안에만 존재합니다.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script>
'use strict';

/* ── 텍스트 데이터 ── */
const RAW=[
  {s:null,t:"그렇게 시허옇다고? 세상에, 내가 귀신처럼 보인다고 장담하지. 피 2 갤런은 흘린 거 같아."},
  {s:null,t:"뭐? 아냐, 긁힌 것도 아니야."},
  {s:null,t:"두서없이 이야기해서 미안. 그냥…뭐라고 해야 하지? 제삼자처럼 보고 있는 거 같아."},
  {s:null,t:"이상한 감정이지. 그런 건 현장에서 많이 봐왔지. 내가 그런 걸 경험하게 될 줄 알았다면 이맘때쯤이라고 생각하기는 했지…. 지랄 같은 일이지. 내 몸 밖에서 나와 둥둥 떠 있는 거 같아. 끈을 자르면 난 저 멀리 떠나가겠지."},
  {s:null,t:"범죄현장 봤어? 보지 마. 사진 보지 마. 파일도 건들지 마. 나중에 나한테 고마워할 거야."},
  {s:null,t:"다리 떠는 거 멈출 수가 없어. 그래서 커피를 그렇게 들고 있는 거야? 탁자를 내가 흔들고 있는 거지? 잠깐만, 의자 좀 뒤로 밀게. 휴, 훨씬 낫군."},
  {s:"심문관",t:"공식적으로 가야 합니다, 홉 씨. 당신이 변호인선임권을 포기한다고 공식적으로 확인해주시겠습니까?"},
  {s:null,t:"아니, 변호사 선임에는 아직도 관심이 없어. 내 말은, 맞아. 그 권리를 포기할 거야. 미안. 그리고 난 제정신이기는 해."},
  {s:"심문관",t:"확실합니까?"},
  {s:null,t:"응."},
  {s:"심문관",t:"그럼 은퇴한 홉슨 밀게이트 형사는 변호인선임권을 포기했다고 기록에 남기겠습니다."},
  {s:null,t:"DA 얘들이 구역질을 멈추고 이걸 공개하려고 해도 난 변호사 필요 없어. 걔네들은 판사한테 안 보여줄 거라고."},
  {s:"심문관",t:"시작할 준비가 되셨나요?"},
  {s:null,t:"아니, 하지만 말하기는 할게."},
  {s:"심문관",t:"어떤 것이 당신을 그 밤에 범죄현장으로 가게 했죠?"},
  {s:null,t:"이 일이 시작하기 전에 낚시하러 가려고 했다고 말하면 믿을 거야? 신경 쓰지 마. 잠깐만, 생각 중이야. 정리하는 게 힘들어. 한 번도 심문대 이쪽에 앉아 본 적이 없었거든."},
  {s:null,t:"그 기자 얘기부터 해야겠지. 이름은 바머야. 그녀가 이메일로 일주일 전에 나한테 컨택했고 드리스콜 살인 사건에 대해 새 증거가 있다고 했어. 내가 총괄 수사관이었거든. 20년 동안 미해결사건이었지. 얼음처럼 꽁꽁 얼어붙은 채로 말이야."},
  {s:null,t:"솔직히, 맨 처음에는 헛소리라고 생각했어. 대부분, 고의로는 아니지만 모든 사람이 사건을 해결할 수 있는 걸 안다고 생각하지. 증거랑 비교해서 확인하지 않는다면 이론 세우기는 쉽지."},
  {s:null,t:"내가 은퇴했을 때 난 캐럴 형사한테 수사권을 넘겼지. 난 그를 귀찮게 굴고 싶지는 않았어. 최근 갱 활동으로 바쁘다는 걸 알거든. 그래서 예의상 내가 확인해봐도 되겠다고 생각했지. 그게 딴 길로 샐 줄 예상하지는 못했었어."},
  {s:null,t:"점심에 퍼이어 카페에서 만났어. 예쁘게 생긴 금발 여자였지, 전문가 같았어. 그래서 사기꾼이나 음모론자의 전형적인 프로필과는 맞지 않았지."},
  {s:null,t:"난 아직도 그녀가 뻥을 치는 거나 그녀도 누군가한테 속았을지도 모른다고 생각했어. 하지만 서류를 갖고 왔더군. 드리스콜이 자백한 것으로 보이는 것이 들어있었어…뭐, 그는 살인마는 아니잖아, 그렇지?"},
  {s:null,t:"진짜 난 그가 살인마였길 바라고 있어. 그건 모두에게 좋은 일이었을 텐데 말이야."},
  {s:"심문관",t:"드리스콜 사건에서 관련된 부분을 자세하게 말씀해주실 수 있습니까?"},
  {s:null,t:"어디 보자. 20년 전에 일어났지. 그 년수를 생각하니깐…아니, 빌어먹을 20년. 그건 오랜 기간이야…"},
  {s:"심문관",t:"천천히 하세요, 홉."},
  {s:null,t:"고마워."},
  {s:null,t:"교외에서 사는 드리스콜 여섯 식구가 있었지. 중상위 계층이고, 아버지는 변호사, 어머니는 집 밖에서 도자기를 파는 사업을 하고 있었어. 얘들은 4명이고, 모두 고등학생이거나 그 이하의 나이였어. 착한 얘들이었지. 우등생들이었고. 자세히 조사해도 나올 게 없는 평범한 집안이었지."},
  {s:null,t:"그들은 1994년 10월 13일에 사라졌어. 어떤 자취도 발견되지 않았어. 가족 전부가 사라졌는데 아무도 그걸 못 봤어. 어디로 갔는지 아무도 몰랐지."},
  {s:null,t:"이웃이 소음 민원을 넣었지. 그래서 우리가 끼어들게 된 거야. 알람이 울렸고 침입자가 집 안에 들어왔다고 생각했지. 우리는 차량을 보냈어. 아무도 문에서 대답하지 않자, 순찰경찰관이 수사하러 들어갔지."},
  {s:null,t:"막내딸 방에서 명백한 저항 흔적이 있더군. 침대는 뒤로 뒤집혀 있었고 침대 시트는 찢어졌지. 알람은 일산화탄소 감지기였어. 우리는 막내딸 것을 제외한 모든 침대보에서 진한 일산화탄소 농도가 검출되었어."},
  {s:null,t:"이웃 사람은 알람이 하루 이상 동안 울렸다는 걸 알려줬지. 우리는 또 몇 개의 알루미늄 통과 호스를 몇 블록 떨어진 쓰레기통에서 발견했어. 그 당시, 드리스콜 가족은 가스로 중독되고 다른 장소에서 처리되었다고 추정했지."},
  {s:null,t:"어떤 실마리도 수사를 진행하면서 발견되지 않았어. 맨 처음에는 아버지가 그런 거로 생각했어. 확인해봤지만 어떤 동기도 없더라고. 후속 단서도 없었지."},
  {s:null,t:"드리스콜 가족은 기절 당하고 납치되었어. 누구도 시체를 발견하지 못했어. 그 가족들이 그냥 도피한 게 아니라고 누가 말할 수 있겠어?"},
  {s:"심문관",t:"그 자백이 바머씨와 어떻게 마무리 지어졌는지에 대해 말씀해주실 수 있으신가요?"},
  {s:null,t:"그녀는 몇 년 동안 그 사건을 쫓아왔더군. 개인적으로도, 기자로서도 말이야. 심지어 정상처럼 보이는 사람들조차 외계인의 짓이라는 둥, 귀신이나 악마의 짓이라고 생각했어."},
  {s:null,t:"기사를 기고한 후, 바머양은 서류를 받았다고 말했어. 자백 편지에는 '거짓말 좀 그만 찍어. 난 누구도 죽이지 않았어. 단지 아침 식사를 위해 그들을 준비시키는 게 오래 걸렸을 뿐이야.' 사인은 없었어."},
  {s:null,t:"그리고 난 그걸 기억했었지. 제기랄. 우리는 실종 한 달 이후 보내진 아침 식사 메뉴를 받았어. 누군가 팬케이크 사진에 빨간색 펜으로 동그라미를 그려놨었지. 우리는 그걸 쓰레기 실마리 파일에 넣어놨지."},
  {s:null,t:"이런 세상에."},
  {s:"심문관",t:"밀게이트 형사님, 시간이 필요하십니까?"},
  {s:null,t:"오 세상에. 어…. 어떻게 몰랐지?"},
  {s:null,t:"난 단지……. 오 하느님."},
  {s:"심문관",t:"왜 개인적으로 편지에 언급된 장소를 수사하기로 하셨죠?"},
  {s:null,t:"미안. 난 이게 사기가 아니라는 걸 확신하고 싶었어. 20년 동안 사람들이 나한테 가짜 증거를 보냈으니깐."},
  {s:null,t:"바머양은 도시기록을 통해 장소를 정확히 짚었었네. 하지만 우리 둘 다 그게 아직도 거기 있을지는 확신하지는 못했어. 버려진 산업건물이었거든."},
  {s:null,t:"난 그걸 해결하는 사람이 되고 싶다고 생각했어. 그 사건은 20년 동안 내 머릿속에 있었거든. 다음 날 아침 바머양과 나는 거기서 만나기로 동의했었어."},
  {s:"심문관",t:"범죄 현장을 묘사해주실 수 있으신가요?"},
  {s:null,t:"그래. 내가 말했듯이, 그건 산업건물이었어. 거의 120피트 높이에 45피트 넓이인 건물이었어. 목조건물이고 입구가 쇠사슬로 묶이고 잠가져 있었어."},
  {s:null,t:"건물 안에서 냄새가 났었어. 매우 희미하게. 시체 썩는 냄새는 절대 잊을 수 없는 걸 알잖아."},
  {s:null,t:"있잖아, 난 정말로 그들이 죽었길 바라. 그가 연쇄 살인마였으면 좋았을 텐데. 진짜로."},

/* ══════════════════════════════════════════
   핵심 상태
══════════════════════════════════════════ */
const dotEl  = document.getElementById('dot');   // 시선 점 — 항상 DOM에 존재
const barEl  = document.getElementById('bar');
const sbarR  = document.getElementById('sbar-r');
const sbarL  = document.getElementById('sbar-l');

let gx = -999, gy = -999;   // 현재 시선 화면 좌표
let chars = [], total = 0;
// 모바일/데스크탑 분기
const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

const RADIUS = IS_MOBILE ? 30 : 40;   // 모바일은 반경 약간 크게
const FADE   = IS_MOBILE ? 0.2 : 0.2; // 모바일은 소멸 약간 빠르게
let rafId, lastTs = 0;

/* ── 시선 점 이동 (단일 함수로 통합) ── */
function moveGazeDot(x, y) {
  gx = x; gy = y;
  dotEl.style.left = x + 'px';
  dotEl.style.top  = y + 'px';
  dotEl.style.visibility = 'visible';
}

/* ── 글자 렌더링 ── */
function buildText() {
  const c = document.getElementById('txt');
  c.innerHTML = ''; chars = [];
  RAW.forEach(b => {
    if (b.s) {
      const row = document.createElement('div');
      row.className = 'spk-row';
      const sp = document.createElement('span');
      sp.className = 'spk';
      sp.textContent = b.s;
      row.appendChild(sp);
      const p = document.createElement('p');
      p.className = 'para';
      [...b.t].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'ch'; s.textContent = ch;
        p.appendChild(s);
        chars.push({el:s, op:1, gone:false});
      });
      p.appendChild(document.createTextNode(' '));
      row.appendChild(p);
      c.appendChild(row);
    } else {
      const p = document.createElement('p');
      p.className = 'para';
      [...b.t].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'ch'; s.textContent = ch;
        p.appendChild(s);
        chars.push({el:s, op:1, gone:false});
      });
      p.appendChild(document.createTextNode(' '));
      p.className = 'para no-spk';
      c.appendChild(p);
    }
  });
  total = chars.length;
}

/* ── 프레임 루프 ── */
function tick(ts) {
  rafId = requestAnimationFrame(tick);
  // FPS 캡 제거 — rAF가 디스플레이 주사율에 자동 동기화
  // 글자 소멸 연산만 담당 (시선 좌표는 FaceMesh onResults에서 별도 업데이트)
  let dirty = false;
  chars.forEach(c => {
    if (c.gone) return;
    const r  = c.el.getBoundingClientRect();
    const cx = (r.left + r.right)  * .5;
    const cy = (r.top  + r.bottom) * .5;
    if (Math.hypot(cx - gx, cy - gy) < RADIUS) {
      c.op = Math.max(0, c.op - FADE);
      c.el.style.opacity = c.op;
      if (c.op === 0) c.gone = true;
      dirty = true;
    }
  });
  if (dirty) {
    const gone = chars.filter(c=>c.gone).length;
    const pct  = Math.round(gone/total*100);
    barEl.style.width = pct + '%';
    sbarR.textContent = pct + '% 소멸됨';
    if (gone === total) {
      document.getElementById('scr-done').style.display = 'flex';
      cancelAnimationFrame(rafId);
    }
  }
}

/* ── 읽기 시작 ── */
function startReader(mouseMode) {
  document.getElementById('scr-start').style.display = 'none';
  document.getElementById('scr-cal').style.display   = 'none';
  document.getElementById('reader').style.display    = 'block';
  document.getElementById('sbar').style.display      = 'flex';

  if (mouseMode) {
    
    sbarL.textContent = '마우스 모드';
    dotEl.style.background = 'rgba(120,160,255,.7)';
    dotEl.style.visibility = 'visible';
    document.addEventListener('mousemove', e => moveGazeDot(e.clientX, e.clientY));
  } else {
    sbarL.textContent = '시선 추적 활성';
    // dotEl은 이미 보정 화면에서 visibility:visible 상태
  }
  buildText();
  requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════
   MediaPipe FaceMesh
══════════════════════════════════════════ */
let faceMesh, cam;
// 평활화 — 가중 이동평균
const buf = [];
// 모바일은 버퍼 작게(반응성↑), 데스크탑은 크게(안정성↑)
const BUF_N = IS_MOBILE ? 5 : 8;

function smooth(x, y) {
  buf.push({x, y});
  if (buf.length > BUF_N) buf.shift();
  // 선형 가중치 — 제곱보다 부드럽게 추종
  let wx=0, wy=0, ws=0;
  buf.forEach((p,i) => { const w = i + 1; wx+=p.x*w; wy+=p.y*w; ws+=w; });
  return {x: wx/ws, y: wy/ws};
}

// 깜빡임 억제 — 깜빡임 감지 후 N프레임 동안 좌표 고정
let blinkCooldown = 0;      // 남은 억제 프레임 수
const BLINK_SUPPRESS = IS_MOBILE ? 4 : 6;
const BLINK_THRESH   = IS_MOBILE ? 0.015 : 0.018;

// 보정 데이터
const cal = [];   // {rx, ry, sx, sy}
let lastRaw = {x:.5, y:.5};

function mapGaze(rx, ry) {
  const W = window.innerWidth, H = window.innerHeight;
  if (cal.length < 2) return {x: rx*W, y: ry*H};
  const rxs = cal.map(p=>p.rx), rys = cal.map(p=>p.ry);
  const sxs = cal.map(p=>p.sx), sys = cal.map(p=>p.sy);
  const minRX=Math.min(...rxs), maxRX=Math.max(...rxs);
  const minRY=Math.min(...rys), maxRY=Math.max(...rys);
  const minSX=Math.min(...sxs), maxSX=Math.max(...sxs);
  const minSY=Math.min(...sys), maxSY=Math.max(...sys);
  const rngRX = maxRX-minRX, rngRY = maxRY-minRY;
  if (rngRX < 0.003 || rngRY < 0.003) return {x: rx*W, y: ry*H};
  const t = (rx-minRX)/rngRX, u = (ry-minRY)/rngRY;
  return {
    x: Math.max(0, Math.min(W, minSX + t*(maxSX-minSX))),
    y: Math.max(0, Math.min(H, minSY + u*(maxSY-minSY))),
  };
}

function initFaceMesh() {
  faceMesh = new FaceMesh({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:.5, minTrackingConfidence:.5});
  faceMesh.onResults(res => {
    if (!res.multiFaceLandmarks?.[0]) return;
    const lm = res.multiFaceLandmarks[0];
    const lI = lm[473], rI = lm[468];
    if (!lI || !rI) return;
    // 깜빡임 감지 — 눈 개방도 측정
    const lT=lm[159],lB=lm[145],rT=lm[386],rB=lm[374];
    if (lT&&lB&&rT&&rB) {
      const lOpen = Math.abs(lB.y - lT.y);
      const rOpen = Math.abs(rB.y - rT.y);
      const avgOpen = (lOpen + rOpen) / 2;
      if (avgOpen < BLINK_THRESH) {
        // 깜빡임 감지 → 쿨다운 리셋하고 이번 프레임 무시
        blinkCooldown = BLINK_SUPPRESS;
        return;
      }
    }
    // 쿨다운 중이면 좌표 업데이트 안 함 (점 제자리 유지)
    if (blinkCooldown > 0) { blinkCooldown--; return; }
    // iris 평균 → 미러 반전
    const rx = 1-(lI.x+rI.x)/2;
    const ry = (lI.y+rI.y)/2;
    lastRaw = {x:rx, y:ry};
    const sm = smooth(rx, ry);
    const mp = mapGaze(sm.x, sm.y);
    moveGazeDot(mp.x, mp.y);
  });
}

function startCam() {
  const v = document.getElementById('vid');
  v.style.display = 'block';
  cam = new Camera(v, {
    onFrame: async () => { await faceMesh.send({image:v}); },
    width: IS_MOBILE ? 480 : 640, height: IS_MOBILE ? 360 : 480,
  });
  cam.start();
}

/* ══════════════════════════════════════════
   보정 점 UI
══════════════════════════════════════════ */
function calPositions() {
  const W=window.innerWidth, H=window.innerHeight;
  const vvp = window.visualViewport;
  const safeB = vvp ? Math.max(0, H-(vvp.height+vvp.offsetTop)) : 0;
  const pad = safeB + 44;
  return [
    [W*.1, H*.08],[W*.5, H*.08],[W*.9, H*.08],
    [W*.1, H*.50],[W*.5, H*.50],[W*.9, H*.50],
    [W*.1, H-pad],[W*.5, H-pad],[W*.9, H-pad],
  ];
}

// 창 크기 변경 시 보정 데이터 비율 재계산
window.addEventListener('resize', () => {
  if (cal.length === 0) return;
  const W = window.innerWidth, H = window.innerHeight;
  cal.forEach(p => {
    // 저장된 비율로 sx/sy 재계산
    if (p.rx_ratio !== undefined) {
      p.sx = p.rx_ratio * W;
      p.sy = p.ry_ratio * H;
    }
  });
});

let calIdx=0, calDots=[];
function setupCalDots() {
  const scr = document.getElementById('scr-cal');
  const pos = calPositions();
  pos.forEach(([sx,sy],i) => {
    const d = document.createElement('div');
    d.className = 'cdot' + (i>0?' off':'');
    d.style.left = sx+'px'; d.style.top = sy+'px';
    d.addEventListener('click', ()=>{
      if (i!==calIdx) return;
      // 보정 포인트: 버퍼 평균 사용
      const n = Math.min(buf.length,5);
      const sl = buf.slice(-n);
      const avgRX = sl.reduce((a,p)=>a+p.x,0)/n || lastRaw.x;
      const avgRY = sl.reduce((a,p)=>a+p.y,0)/n || lastRaw.y;
      cal.push({
        rx:avgRX, ry:avgRY, sx, sy,
        rx_ratio: sx / window.innerWidth,   // 창 비율 저장
        ry_ratio: sy / window.innerHeight,
      });
      d.classList.add('done');
      calIdx++;
      if (calIdx<pos.length) {
        calDots[calIdx].classList.remove('off');
      } else {
        startReader(false);
      }
    });
    scr.appendChild(d);
    calDots.push(d);
  });
}

/* ══════════════════════════════════════════
   버튼
══════════════════════════════════════════ */
document.getElementById('btn-start').addEventListener('click', ()=>{
  navigator.mediaDevices.getUserMedia({video:true})
    .then(stream => {
      stream.getTracks().forEach(t=>t.stop());
      document.getElementById('scr-start').style.display = 'none';
      document.getElementById('scr-cal').style.display   = 'block';
      // 시선 점 즉시 표시 (보정 화면에서도)
      dotEl.style.background  = 'rgba(200,75,30,.8)';
      dotEl.style.visibility  = 'visible';
      initFaceMesh();
      setupCalDots();
      startCam();
    })
    .catch(()=>{
      document.getElementById('scr-start').style.display = 'none';
      startReader(true);
    });
});

document.getElementById('btn-mouse').addEventListener('click', ()=>{
  document.getElementById('scr-start').style.display = 'none';
  startReader(true);
});
</script>
